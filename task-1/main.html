<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sign Up.com</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="D:\task-1\css\style.css">
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>JobSearch.com</h1>
        </div>

        <h2>Create Your Account</h2>
        <p class="note">* Required information</p>

        <!-- Basic Info -->
        <div class="section">
            <h3>Basic Information</h3>

            <label>Email *</label>
            <input type="email">

            <label>Password *</label>
            <input type="password">

            <label>Retype Password *</label>
            <input type="password">

            <label>First Name *</label>
            <input type="text">

            <label>Last Name *</label>
            <input type="text">

            <label>Phone Number *</label>
            <input type="tel" placeholder="999-999-9999">

            <label>Address *</label>
            <input type="text">

            <label>City *</label>
            <input type="text">

            <label>Province *</label>
            <select>
                <option>Alberta</option>
                <option>Ontario</option>
            </select>

            <label>Country *</label>
            <input type="text">
        </div>

        <!-- Education -->
        <div class="section">
            <h3>Education</h3>

            <label>School *</label>
            <input type="text">

            <label>Program *</label>
            <input type="text">

            <label>Education Level *</label>
            <select>
                <option>-select-</option>
                <option>level 1</option>
                <option>level 2</option>
                <option>level 3</option>
                <option>level 4</option>
            </select>

            <div class="radio-group">

                <div class="radio-item">
                    <span>Graduated</span>
                    <input type="radio" name="status">
                </div>

                <div class="radio-item">
                    <span>Current Enrolled</span>
                    <input type="radio" name="status">
                </div>

                <div class="radio-item">
                    <span>Did Not Graduate</span>
                    <input type="radio" name="status">
                </div>

            </div>
            <label>Graduation Date</label>
            <input type="date">
        </div>

        <!-- Work -->
        <div class="section">
            <h3>Work Experience</h3>

            <label>Employer</label>
            <input type="text">

            <label>Job Title</label>
            <input type="text">

            <label>Job Duty</label>
            <textarea></textarea>

            <label>Worked Year</label>
            <input type="number">
        </div>

        <!-- Attachments -->
        <div class="section">
            <h3>Attachments</h3>

            <input type="file">
        </div>

        <div class="buttons">
            <button class="reset">Reset</button>
            <button class="apply">Apply</button>
        </div>

    </div>

</body>

</html>
